<!doctype html>
<html lang="{{ site.lang | default: 'ko' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="dark">
    <title>{% if page.title and page.title != site.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
    <meta name="description" content="{{ page.description | default: site.description | strip_html | normalize_whitespace }}">
    <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%22http://www.w3.org/2000/svg%22%20viewBox%3D%220%200%2064%2064%22%3E%3Crect%20width%3D%2264%22%20height%3D%2264%22%20rx%3D%2216%22%20fill%3D%22%2326d9ff%22/%3E%3Cpath%20d%3D%22M22%200h20v64H22z%22%20fill%3D%22%23d7ff37%22/%3E%3Cpath%20d%3D%22M42%200h22v64H42z%22%20fill%3D%22%23ff802f%22/%3E%3Ctext%20x%3D%2232%22%20y%3D%2238%22%20text-anchor%3D%22middle%22%20font-family%3D%22Arial,sans-serif%22%20font-size%3D%2216%22%20font-weight%3D%22900%22%20fill%3D%22%23030407%22%3EPBN%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="{{ '/assets/css/site.css' | relative_url }}">
  </head>
  <body class="pbn-shell" data-page-url="{{ page.url }}" data-baseurl="{{ site.baseurl }}">
    <div class="pbn-ambient" aria-hidden="true">
    </div>

    <header class="pbn-topbar">
      <a class="pbn-brand" href="{{ '/' | relative_url }}" aria-label="식물 육종 뉴스 홈">
        <span class="pbn-brand__mark">PBN</span>
        <span class="pbn-brand__text">식물 육종 뉴스</span>
      </a>
      <nav class="pbn-nav" aria-label="주요 메뉴">
        <a href="{{ '/podcast/' | relative_url }}">에피소드</a>
        <a href="{{ '/weekly/latest.html' | relative_url }}">브리핑</a>
        <a href="{{ '/' | relative_url }}#recent">뉴스</a>
        <a href="{{ '/' | relative_url }}#weekly-archive">아카이브</a>
      </nav>
      <form class="pbn-search" role="search">
        <label class="sr-only" for="pbn-search-input">뉴스 검색</label>
        <input id="pbn-search-input" type="search" placeholder="품종, 작물, 유전자 검색" autocomplete="off">
      </form>
    </header>

    <main class="pbn-main" id="main-content">
      <article class="markdown-source" id="markdown-source">
        {{ content }}
      </article>
    </main>

    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
